<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دەنا شێرەکەم</title>
    <style>
        /* إضافة الخط الجديد */
        @font-face {
            font-family: 'NewRudaw';
            src: url(fonts/sr/NewRudaw-Bold.eot);
            src: url(fonts/sr/NewRudaw-Bold.eot?#iefix) format('embedded-opentype'), 
                 url(fonts/sr/NewRudaw-Bold.woff2) format('woff2'), 
                 url(fonts/sr/NewRudaw-Bold.woff) format('woff'), 
                 url(fonts/sr/NewRudaw-Bold.ttf) format('truetype');
            font-weight: bold;
            font-style: normal;
            font-display: swap; 
        }

        :root { --primary: #2980b9; --secondary: #2c3e50; --wrong: #e74c3c; --correct: #27ae60; --bg: #f4f7f6; }
        
        /* تطبيق الخط على كامل الصفحة */
        body { font-family: 'NewRudaw', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        
        .quiz-container { background: white; width: 100%; max-width: 900px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 0 auto; }
        h1 { text-align: center; color: var(--secondary); border-bottom: 3px solid var(--primary); padding-bottom: 15px; font-size: 24px; }
        .stats { display: flex; justify-content: space-between; background: #eee; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        .question { font-size: 20px; color: var(--secondary); line-height: 1.6; margin-bottom: 25px; border-right: 5px solid var(--primary); padding-right: 15px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* تطبيق الخط على الأزرار */
        button.option { padding: 15px; border: 2px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; transition: 0.3s; font-family: 'NewRudaw', sans-serif; font-size: 16px; text-align: right; display: flex; align-items: center; }
        
        button.option:hover:not([disabled]) { border-color: var(--primary); background: #f9f9f9; }
        button.correct { background: var(--correct) !important; color: white; border-color: #1e8449; }
        button.wrong { background: var(--wrong) !important; color: white; border-color: #a93226; }
        .result-screen { display: none; text-align: center; }
        .final-score { font-size: 40px; color: var(--primary); margin: 20px 0; }
        .review-section { margin-top: 40px; text-align: right; display: none; }
        .review-item { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
        .review-q { font-weight: bold; margin-bottom: 10px; color: var(--secondary); }
        .review-opt { font-size: 14px; margin: 5px 0; padding: 5px; border-radius: 5px; }
        .opt-correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .opt-wrong { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .btn-action { padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; font-family: 'NewRudaw', sans-serif; font-size: 16px;}
        .btn-pdf { background: #2980b9; color: white; }
        .btn-reload { background: var(--correct); color: white; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-box">
        <h1>پرسیاری ئەسئیلەی ساڵی پار</h1>
        <div class="stats">
            <span>prsear: <span id="q-num">1</span> / <span id="total-q">100</span></span>
            <span>walam: <span id="score">0</span></span>
        </div>
        <div id="question" class="question"> ...</div>
        <div id="options" class="options"></div>
    </div>

    <div id="result-box" class="result-screen">
        <h1>پیرۆزە تەواو بوو</h1>
        <div class="final-score" id="final-res">0 / 100</div>
        <div id="percent" style="font-size: 24px; font-weight: bold; margin-bottom: 20px;"></div>
        <button onclick="window.print()" class="btn-action btn-pdf">dabazena sherakam PDF 📄</button>
        <button onclick="location.reload()" class="btn-action btn-reload">dwbaray karawa sherakay bazian  🔄</button>
        <div id="review-area" class="review-section">
            <h2 style="border-bottom: 2px solid var(--secondary); padding-bottom: 10px;">pedachunawa:</h2>
            <div id="review-list"></div>
        </div>
    </div>
</div>

let questions = [];
let currentQIndex = 0;
let score = 0;
let userAnswers = [];

// دالة خلط المصفوفة 
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startQuiz() {
    questions = [...rawData];
    document.getElementById("total-q").innerText = questions.length;
    // لإلغاء ترتيب خلط الأسئلة ضع علامة // قبل السطر التالي:
    shuffle(questions);
    loadQuestion();
}

function loadQuestion() {
    if (currentQIndex >= questions.length) {
        showResults();
        return;
    }

    const qData = questions[currentQIndex];
    document.getElementById("question").innerText = qData.q;
    document.getElementById("q-num").innerText = currentQIndex + 1;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    // خلط الخيارات عشوائياً قبل عرضها
    let shuffledOptions = shuffle([...qData.a]);
    const labels = ["أ", "ب", "ج", "د", "هـ"];

    shuffledOptions.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerHTML = `<span style="font-weight:bold; margin-left:10px;">${labels[index]})</span> ${opt}`;
        btn.onclick = () => checkAnswer(btn, opt, qData.c);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(btn, selected, correct) {
    const allBtns = document.querySelectorAll(".option");
    allBtns.forEach(b => b.disabled = true);

    userAnswers.push({
        q: questions[currentQIndex].q,
        options: questions[currentQIndex].a,
        selected: selected,
        correct: correct
    });

    if (selected === correct) {
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
        allBtns.forEach(b => {
            if (b.innerText.includes(correct)) {
                b.classList.add("correct");
            }
        });
    }

    document.getElementById("score").innerText = score;

    setTimeout(() => {
        currentQIndex++;
        loadQuestion();
    }, 1000); // سرعة الانتقال للسؤال التالي (ثانية واحدة)
}

function showResults() {
    document.getElementById("quiz-box").style.display = "none";
    document.getElementById("result-box").style.display = "block";
    
    let total = questions.length;
    document.getElementById("final-res").innerText = score + " / " + total;
    
    let per = Math.round((score / total) * 100);
    document.getElementById("percent").innerText = "نسبة النجاح: " + per + "%";
    
    generateReview();
}

function generateReview() {
    const reviewList = document.getElementById("review-list");
    reviewList.innerHTML = "";

    userAnswers.forEach((item, index) => {
        const itemDiv = document.createElement("div");
        itemDiv.className = "review-item";

        let optionsHtml = "";
        item.options.forEach(opt => {
            let statusClass = "";
            if (opt === item.correct) {
                statusClass = "opt-correct"; // لون أخضر للإجابة الصحيحة
            } else if (opt === item.selected && item.selected !== item.correct) {
                statusClass = "opt-wrong"; // لون أحمر لاختيارك الخاطئ
            }
            optionsHtml += `<div class="review-opt ${statusClass}">${opt}</div>`;
        });

        itemDiv.innerHTML = `
            <div class="review-q">${index + 1}. ${item.q}</div>
            ${optionsHtml}
        `;
        reviewList.appendChild(itemDiv);
    });
    document.getElementById("review-area").style.display = "block";
}

startQuiz();
</script>
</body>
</html>
